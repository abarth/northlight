name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Deploys by force-pushing dist/ to the gh-pages branch. Unlike the
# actions/deploy-pages flow, this needs no pre-enabled Pages site: creating
# a gh-pages branch auto-enables Pages, and the default workflow token can
# push branches (it cannot call the "create Pages site" admin API).
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Project pages are served from /<repo>/
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Publish dist to gh-pages
        run: |
          cd dist
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
