name: Deploy to GitHub Pages

# Deploys the prod branch after its CI run (build + GPU test suite) goes
# green. The workflow_run trigger requires this file to live on the default
# branch; the checkout below targets the prod commit CI actually validated.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [prod]
  workflow_dispatch:

# Deploys by force-pushing dist/ to the gh-pages branch. Unlike the
# actions/deploy-pages flow, this needs no pre-enabled Pages site: creating
# a gh-pages branch auto-enables Pages, and the default workflow token can
# push branches (it cannot call the "create Pages site" admin API).
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # On workflow_run, deploy the exact commit CI passed on; a manual
          # dispatch deploys the tip of prod regardless of which branch the
          # workflow was dispatched from.
          ref: ${{ github.event.workflow_run.head_sha || 'prod' }}

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Project pages are served from /<repo>/
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Publish dist to gh-pages
        run: |
          DEPLOY_SHA=$(git rev-parse HEAD)
          cd dist
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ${DEPLOY_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
